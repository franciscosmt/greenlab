<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Define o conjunto de caracteres e a escala da página para dispositivos móveis -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Título da aba do navegador -->
  <title>Início | Horta Automatizada</title>
  
  <!-- Importa o arquivo CSS para estilos da página -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Barra de navegação principal -->
  <nav class="navbar">
    <!-- Nome do projeto/logo -->
    <h2><a href="index.html" class="logo">🌿 GreenLab 🌿</a></h2>
    
    <!-- Botão de menu para dispositivos móveis -->
    <button class="menu-toggle">☰</button>
    
    <!-- Menu de navegação com links para outras páginas -->
    <ul class="menu">
      <li><a href="index.html" class="active">Início</a></li>
      <li><a href="informacoes.html">Informações</a></li>
      <li><a href="equipe.html">Equipe de Projeto</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>
  </nav>

  <!-- Conteúdo principal da página -->
  <main class="container">
    <!-- Título principal -->
    <h1>Horta Automatizada</h1>
    
    <!-- Seção com informações dos sensores -->
    <section class="sensors">
      <!-- Cartão que exibe o valor da umidade do solo -->
      <div class="card"><h2>🌱 Umidade</h2><p id="soil">--%</p></div>
      
      <!-- Cartão que exibe a temperatura ambiente -->
      <div class="card"><h2>🌡️ Temperatura</h2><p id="temperature">--°C</p></div>
      
      <!-- Cartão que mostra o nível de luminosidade -->
      <div class="card"><h2>☀️ Luminosidade</h2><p id="light">--</p></div>
    </section>
    
    <!-- Seção de controle de irrigação -->
    <section class="irrigation">
      <!-- Exibe o estado atual da irrigação -->
      <h2>Irrigação: <span id="status">Desligada</span></h2>
      
      <!-- Botão para ligar/desligar o sistema de irrigação -->
      <button id="toggle">Ligar o Sistema</button>
    </section>
  </main>

  <!-- Rodapé da página (ainda sem conteúdo) -->
  <footer class="rodape"></footer>

  <!-- Importa as bibliotecas do Firebase para conexão com banco de dados em tempo real -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  
  <!-- Script JavaScript com a lógica do projeto (acesso ao Firebase, controle dos sensores e irrigação) -->
  <script src="js/script1.js"></script>
</body>
</html>
