<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato | Horta Automatizada</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Barra de navegação superior -->
  <nav class="navbar">
    <h2><a href="index.html" class="logo">🌿 GreenLab 🌿</a></h2>
    <button class="menu-toggle">☰</button>
    <ul class="menu">
      <li><a href="index.html">Início</a></li>
      <li><a href="informacoes.html">Informações</a></li>
      <li><a href="equipe.html">Equipe de Projeto</a></li>
      <li><a href="contato.html" class="active">Contato</a></li>
    </ul>
  </nav>

  <!-- Conteúdo principal -->
  <main class="container">
    <h1>Formulário de Contato</h1>

    <!-- Formulário com campos diversos -->
    <form id="contatoForm">

      <!-- Campo de nome -->
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required>

      <!-- Campo de seleção de gênero -->
      <label for="genero">Gênero:</label>
      <select id="genero" name="genero" required>
        <option value="">Selecione</option>
        <option value="Masculino">Masculino</option>
        <option value="Feminino">Feminino</option>
        <option value="Outro">Outro</option>
      </select>

      <!-- Campo de endereço -->
      <label for="endereco">Endereço:</label>
      <input type="text" id="endereco" name="endereco" required>

      <!-- Campo de telefone -->
      <label for="telefone">Telefone:</label>
      <input type="tel" id="telefone" name="telefone" required>

      <!-- Campo de e-mail -->
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <!-- Campo de mensagem -->
      <label for="mensagem">Mensagem:</label>
      <textarea id="mensagem" name="mensagem" required></textarea>

      <!-- Botão para enviar o formulário -->
      <button type="submit">Enviar</button>
    </form>

    <!-- Espaço para exibir resposta do envio -->
    <p id="resposta"></p>
  </main>

  <!-- Rodapé da página (ainda sem conteúdo) -->
  <footer class="rodape"></footer>

  <!-- Script JS (opcional, se desejar tratar o envio ou resposta) -->
  <script src="js/script1.js"></script>
  </body>
</html>
